 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Compteur de Dhikr simple, élégant et sans distractions pour vos invocations quotidiennes.">
    <title>Compteur de Dhikr</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📿</text></svg>">
    <link rel="stylesheet" href="Dhirk.css">
</head>
<body>

    <div class="container">
        <div class="quote">
            "N'est-ce point par l'évocation d'Allah que se tranquillisent les cœurs ?"
        </div>

        <div class="goal-card">
            <div class="goal-info">
                <span>Objectif : <span id="ui-goal">100</span></span>
                <span><span id="ui-count-small">0</span> / <span id="ui-goal-small">100</span></span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-fill" id="ui-progress"></div>
            </div>
        </div>

        <div id="ui-congrats" class="congrats-message">✨ Ma shaa Allah, objectif atteint ! ✨</div>

        <div class="counter-display" id="ui-count-large">0</div>

        <div class="dhikr-buttons">
            <button class="btn-main" onclick="increment('SubhanAllah')">SubhanAllah</button>
            <button class="btn-main" onclick="increment('Alhamdulillah')">Alhamdulillah</button>
            <button class="btn-main" onclick="increment('Allahu Akbar')">Allahu Akbar</button>
        </div>

        <div class="controls">
            <button class="btn-small" onclick="resetCount()">🔄 Reset</button>
            <button class="btn-small" onclick="changeGoal()">🎯 Objectif</button>
        </div>

        <div class="stats-container">
            <div class="stat-item">
                <span>Total Global</span>
                <span class="stat-value" id="ui-global-count">0</span>
            </div>
            <div class="stat-item">
                <span>Série (Jours)</span>
                <span class="stat-value" id="ui-streak">1</span>
            </div>
        </div>
    </div>

    <script>
    // --- 1. INITIALISATION & CHARGEMENT SÉCURISÉ ---
    const today = new Date().toDateString();
    
    let count, goal, globalCount, streak, history, statsPerType;
    
    try {
        count = parseInt(localStorage.getItem('dhikr_count')) || 0;
        goal = parseInt(localStorage.getItem('dhikr_goal')) || 100;
        globalCount = parseInt(localStorage.getItem('dhikr_global')) || 0;
        streak = parseInt(localStorage.getItem('dhikr_streak')) || 1;
        history = JSON.parse(localStorage.getItem('dhikr_history')) || {};
        statsPerType = JSON.parse(localStorage.getItem('dhikr_stats_type')) || {
            'SubhanAllah': 0, 'Alhamdulillah': 0, 'Allahu Akbar': 0
        };
    } catch (e) {
        count = 0; goal = 100; globalCount = 0; streak = 1;
        history = {}; statsPerType = {'SubhanAllah': 0, 'Alhamdulillah': 0, 'Allahu Akbar': 0};
    }

    // --- 2. GESTION DU RESET QUOTIDIEN ---
    let lastDate = localStorage.getItem('dhikr_date');
    if (lastDate !== today) {
        if (lastDate) {
            let hier = new Date();
            hier.setDate(hier.getDate() - 1);
            streak = (lastDate === hier.toDateString()) ? streak + 1 : 1;
            localStorage.setItem('dhikr_streak', streak);
        }
        count = 0;
        localStorage.setItem('dhikr_count', 0);
        localStorage.setItem('dhikr_date', today);
    }

    let audioCtx;

    // --- 3. MISE À JOUR DE L'INTERFACE (Avec Félicitations) ---
    function updateUI() {
        document.getElementById('ui-count-large').textContent = count;
        document.getElementById('ui-count-small').textContent = count;
        document.getElementById('ui-goal').textContent = goal;
        document.getElementById('ui-goal-small').textContent = goal;
        document.getElementById('ui-global-count').textContent = globalCount;
        document.getElementById('ui-streak').textContent = streak + " 🔥";

        let percentage = goal > 0 ? (count / goal) * 100 : 0;
        document.getElementById('ui-progress').style.width = Math.min(percentage, 100) + '%';

        // NOUVEAU : Affichage du message de félicitations
        const congratsEl = document.getElementById('ui-congrats');
        if (count >= goal && goal > 0) {
            congratsEl.classList.add('show');
        } else {
            congratsEl.classList.remove('show');
        }
    }

    // --- 4. LOGIQUE D'INCRÉMENTATION ---
    let lastClick = 0;
    function increment(type) {
        const now = Date.now();
        if (now - lastClick < 50) return;
        lastClick = now;

        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        count++;
        globalCount++;
        if (statsPerType[type] !== undefined) statsPerType[type]++;
        history[today] = (history[today] || 0) + 1;
        
        save();
        updateUI();
        triggerEffects();
    }

    function save() {
        localStorage.setItem('dhikr_count', count);
        localStorage.setItem('dhikr_global', globalCount);
        localStorage.setItem('dhikr_history', JSON.stringify(history));
        localStorage.setItem('dhikr_stats_type', JSON.stringify(statsPerType));
    }

    // --- 5. EFFETS ---
    function triggerEffects() {
        const el = document.getElementById('ui-count-large');
        el.classList.remove('pop');
        void el.offsetWidth; 
        el.classList.add('pop');

        if (navigator.vibrate) {
            if (count === goal) navigator.vibrate([100, 50, 100]);
            else navigator.vibrate(40);
        }

        if (audioCtx) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
    }

    // --- 6. RÉGLAGES ---
    function resetCount() {
        if (confirm("Voulez-vous remettre le compteur du jour à zéro ?")) {
            count = 0;
            save();
            updateUI();
        }
    }

    function changeGoal() {
        let val = prompt("Fixez votre objectif quotidien (max 10 000) :", goal);
        let n = parseInt(val);
        if (!isNaN(n) && n > 0 && n <= 10000) {
            goal = n;
            localStorage.setItem('dhikr_goal', goal);
            updateUI();
        } else if (val !== null) {
            alert("Veuillez entrer un nombre valide.");
        }
    }

    // --- LANCEMENT INITIAL ---
    updateUI();
    </script>
</body>
</html>
